spring:
  application:
    name: web-bff

  config:
    import:
      - optional:configserver:${CONFIG_SERVER_URI:https://localhost:8888}
      - optional:classpath:platform/tracing-defaults.yml

  cloud:
    config:
      fail-fast: ${CONFIG_FAIL_FAST:false}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:cloud}

server:
  port: ${WEB_BFF_PORT:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

app:
  security:
    jwt:
      secret: ${APP_JWT_SECRET:dev-jwt-secret-change-in-production-min-32-chars}
  bff:
    user-service-base-url: ${APP_BFF_USER_SERVICE_BASE_URL:https://user-service}
    notification-service-base-url: ${APP_BFF_NOTIFICATION_SERVICE_BASE_URL:https://notification-service}
    insecure-ssl: ${APP_BFF_INSECURE_SSL:false}
    load-balanced: ${APP_BFF_LOAD_BALANCED:true}
