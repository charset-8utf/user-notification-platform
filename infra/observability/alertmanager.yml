global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, application]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    # Production: replace with slack_configs (api_url) or pagerduty_configs.
    webhook_configs:
      - url: http://127.0.0.1:9095/alerts
        send_resolved: true
