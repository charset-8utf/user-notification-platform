# Shared user cache (user-service writes, notification-service reads).
# Keys: user:{id}, user:email:{email} — single logical database is enough.

bind 0.0.0.0
port 6379
tcp-keepalive 300

# One DB (index 0). Avoid relying on Redis's default 16 unused databases.
databases 1

# Ephemeral cache: no disk persistence.
save ""
appendonly no

# Evict least-recently-used keys when full (appropriate for TTL-backed cache).
maxmemory 256mb
maxmemory-policy allkeys-lru

# В docker-сети к Redis подключаются user-service и notification-service (не только 127.0.0.1).
protected-mode no

loglevel notice
