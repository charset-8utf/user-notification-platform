spring:
  application:
    name: notification-service
  profiles:
    active: kafka
  mongodb:
    uri: mongodb://localhost:27017/notification
  mail:
    host: localhost
    port: 1025
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: notification-service
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

app:
  kafka:
    security:
      enabled: ${APP_KAFKA_SECURITY_ENABLED:false}
  security:
    service-jwt:
      secret: ${APP_SERVICE_JWT_SECRET:dev-service-jwt-secret-change-in-production-min-32b}
      issuer: ${APP_SERVICE_JWT_ISSUER:user-notification-platform}
      audience: ${APP_SERVICE_JWT_AUDIENCE:notification-service}
      subject: ${APP_SERVICE_JWT_SUBJECT:user-service}
      scope: ${APP_SERVICE_JWT_SCOPE:notifications:write}
  notification:
    site-name: "ваш сайт"
    mail-from: "noreply@localhost"
    kafka:
      topic: user-notifications
      partitions: ${APP_NOTIFICATION_KAFKA_PARTITIONS:3}
      replicas: ${APP_NOTIFICATION_KAFKA_REPLICAS:1}
      listener:
        concurrency: ${APP_NOTIFICATION_KAFKA_LISTENER_CONCURRENCY:3}
      dlt-suffix: ".DLT"
      retry:
        max-attempts: 3
        backoff-ms: 1000

logging:
  level:
    root: INFO
    com.notification: INFO

---
spring:
  config:
    activate:
      on-profile: "!redis"
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration