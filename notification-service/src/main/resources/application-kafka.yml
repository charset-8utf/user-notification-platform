spring:
  kafka:
    listener:
      ack-mode: manual_immediate

management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState, kafkaConsumerLag

---
spring:
  config:
    activate:
      on-property: app.kafka.security.enabled=true

app:
  kafka:
    security:
      username: ${APP_KAFKA_USERNAME:notification-service}
      password: ${APP_KAFKA_PASSWORD}
      trust-store: ${APP_KAFKA_SSL_TRUSTSTORE:classpath:kafka-truststore.p12}
      trust-store-password: ${APP_KAFKA_SSL_TRUSTSTORE_PASSWORD:${KEYSTORE_PASSWORD:changeit}}
      trust-store-type: ${APP_KAFKA_SSL_TRUSTSTORE_TYPE:PKCS12}
      endpoint-identification-algorithm: ${APP_KAFKA_SSL_ENDPOINT_ID_ALGO:}
