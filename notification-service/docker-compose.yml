services:
  mongo:
    image: mongo:7
    container_name: notification-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PUBLISH_PORT:-27017}:27017"
    volumes:
      - notification_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - notification-network

  mailpit:
    image: axllent/mailpit
    container_name: notification-mailpit
    restart: unless-stopped
    ports:
      - "${SMTP_PUBLISH_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - notification-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: notification-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - notification-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: notification-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PUBLISH_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - notification-network

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    image: notification-service:latest
    container_name: notification-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: "rest,kafka"
      APP_SERVICE_JWT_SECRET: ${APP_SERVICE_JWT_SECRET:-dev-service-jwt-secret-change-in-production-min-32b}
      SPRING_MONGODB_URI: mongodb://mongo:27017/notification
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: "1025"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      APP_NOTIFICATION_SITE_NAME: "${APP_NOTIFICATION_SITE_NAME:-ваш сайт}"
      APP_NOTIFICATION_MAIL_FROM: "${APP_NOTIFICATION_MAIL_FROM:-noreply@localhost}"
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD:-changeit}
    ports:
      - "${APP_HTTPS_PORT:-8444}:8443"
    networks:
      - notification-network

volumes:
  notification_mongo_data:

networks:
  notification-network:
    driver: bridge
