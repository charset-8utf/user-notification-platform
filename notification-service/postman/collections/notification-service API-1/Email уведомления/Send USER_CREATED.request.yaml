$kind: http-request
name: Отправить USER_CREATED
url: "{{baseUrl}}/api/notifications/email"
method: POST
headers:
  - key: Authorization
    value: "Bearer {{serviceAuthToken}}"
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "eventId": "{{$guid}}",
      "operation": "USER_CREATED",
      "email": "{{testEmail}}"
    }
order: 1000
