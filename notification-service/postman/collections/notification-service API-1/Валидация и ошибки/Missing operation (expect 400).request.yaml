$kind: http-request
name: Без operation (ожидается 400)
url: "{{baseUrl}}/api/notifications/email"
method: POST
headers:
  - key: Authorization
    value: "Bearer {{serviceAuthToken}}"
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "eventId": "{{$guid}}",
      "email": "{{testEmail}}"
    }
order: 2000
