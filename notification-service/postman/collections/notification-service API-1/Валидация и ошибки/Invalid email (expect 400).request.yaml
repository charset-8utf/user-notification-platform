$kind: http-request
name: Некорректный email (ожидается 400)
url: "{{baseUrl}}/api/notifications/email"
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "eventId": "{{$guid}}",
      "operation": "USER_CREATED",
      "email": "not-an-email"
    }
order: 1000
