$kind: http-request
name: Пустой email (ожидается 400)
url: "{{baseUrl}}/api/notifications/email"
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "eventId": "{{$guid}}",
      "operation": "USER_DELETED",
      "email": ""
    }
order: 3000
