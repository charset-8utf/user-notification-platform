global:
  registry: ""
  imageOwner: ""
  imageTag: latest
  imagePullPolicy: Never

infra:
  enabled: true
  postgres:
    user: postgres
    password: postgres
    database: userdb
    storage: 1Gi
  mongo:
    database: notification
  redis:
    password: ""

platform:
  enabled: true
  configServer:
    image: config-server
    tag: latest
    port: 8888
  userService:
    image: user-service
    tag: latest
    httpsPort: 8443
    managementPort: 8081
  notificationService:
    image: notification-service
    tag: latest
    httpsPort: 8443
    managementPort: 8081

edge:
  enabled: true
  apiGateway:
    image: api-gateway
    tag: latest
    port: 8080
  webBff:
    image: web-bff
    tag: latest
    port: 8090
  ingress:
    enabled: false
    className: ""
    host: localhost
    gatewayPort: 8080
    annotations: {}
    tls: []

observability:
  enabled: false

secrets:
  appJwtSecret: dev-jwt-secret-change-in-production-min-32-chars
  appServiceJwtSecret: dev-service-jwt-secret-change-in-production-min-32b
  seedAdminPassword: admin123
  seedUserPassword: user123
