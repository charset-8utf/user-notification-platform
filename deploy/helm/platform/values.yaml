global:
  registry: ""
  imageOwner: ""
  imageTag: latest
  imagePullPolicy: Never

podSecurity:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

resources:
  configServer:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  userService:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  notificationService:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  apiGateway:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 750m
      memory: 512Mi
  webBff:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 384Mi

infra:
  enabled: true
  postgres:
    user: postgres
    password: postgres
    database: userdb
    storage: 1Gi
  mongo:
    database: notification
    storage: 1Gi
  schemaRegistry:
    port: 8081
  kafka:
    storage: 1Gi
  redis:
    password: ""

platform:
  enabled: true
  kafka:
    serialization: avro
    schemaRegistryUrl: http://schema-registry:8081
  configServer:
    image: config-server
    tag: latest
    port: 8888
  userService:
    image: user-service
    tag: latest
    httpsPort: 8443
    managementPort: 8081
  notificationService:
    image: notification-service
    tag: latest
    httpsPort: 8443
    managementPort: 8081

edge:
  enabled: true
  serviceType: NodePort
  apiGateway:
    image: api-gateway
    tag: latest
    port: 8080
    nodePort: 30080
  webBff:
    image: web-bff
    tag: latest
    port: 8090
    nodePort: 30090
  ingress:
    enabled: false
    className: ""
    host: localhost
    gatewayPort: 8080
    annotations: {}
    tls: []

observability:
  enabled: false
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: prometheus

networkPolicy:
  enabled: true
  ingressControllerNamespace: ingress-nginx

podDisruptionBudget:
  enabled: true

lifecycle:
  preStopSleepSeconds: 10
  terminationGracePeriodSeconds: 60

secrets:
  appJwtSecret: dev-jwt-secret-change-in-production-min-32-chars
  appServiceJwtSecret: dev-service-jwt-secret-change-in-production-min-32b
  seedAdminPassword: admin123
  seedUserPassword: user123

externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreKind: ClusterSecretStore
  secretStoreName: vault-backend
  remoteKey: platform/dev

externalDatabase:
  postgres:
    host: ""
    port: 5432
    user: postgres
    password: ""
    database: userdb
  mongo:
    uri: ""

autoscaling:
  api-gateway:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCpuUtilization: 75
  user-service:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCpuUtilization: 75
  notification-service:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCpuUtilization: 75

certManager:
  createClusterIssuer: false
  clusterIssuerName: letsencrypt-staging
  acmeServer: https://acme-staging-v02.api.letsencrypt.org/directory
  acmeEmail: dev@example.com

auth:
  oidc:
    enabled: false
    issuerUri: ""
