{{- range $name, $cfg := dict "api-gateway" .Values.edge.apiGateway "user-service" .Values.platform.userService "notification-service" .Values.platform.notificationService }}
{{- $auto := index $.Values.autoscaling $name }}
{{- if and $auto $auto.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ $auto.minReplicas }}
  maxReplicas: {{ $auto.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $auto.targetCpuUtilization }}
{{- end }}
{{- end }}
