{{- if .Values.certManager.createClusterIssuer }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuerName }}
spec:
  acme:
    server: {{ .Values.certManager.acmeServer }}
    email: {{ .Values.certManager.acmeEmail }}
    privateKeySecretRef:
      name: {{ .Values.certManager.clusterIssuerName }}-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.edge.ingress.className }}
{{- end }}
