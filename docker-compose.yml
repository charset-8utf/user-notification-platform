services:
  postgres:
    image: postgres:17-alpine
    container_name: unp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - unp-network

  mongo:
    image: mongo:7
    container_name: unp-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PUBLISH_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - unp-network

  redis:
    image: redis:7-alpine
    container_name: unp-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server /usr/local/etc/redis/redis.conf
        fi
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - unp-network

  mailpit:
    image: axllent/mailpit
    container_name: unp-mailpit
    restart: unless-stopped
    ports:
      - "${SMTP_PUBLISH_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - unp-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: unp-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - unp-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: unp-kafka
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2.0
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PUBLISH_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - unp-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: unp-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8085}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - unp-network

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    image: config-server:latest
    container_name: unp-config-server
    restart: unless-stopped
    environment:
      CONFIG_SERVER_PROFILE: native
      CONFIG_REPO_PATH: file:/config-repo
      CONFIG_SERVER_PORT: "8888"
    volumes:
      - ./config-repo:/config-repo:ro
    ports:
      - "${CONFIG_SERVER_PORT:-8888}:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - unp-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: user-service:latest
    container_name: unp-user-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      DB_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD:-changeit}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-admin123}
      APP_SEED_USER_PASSWORD: ${APP_SEED_USER_PASSWORD:-user123}
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_PORT: "8888"
      CONFIG_FAIL_FAST: ${CONFIG_FAIL_FAST:-false}
      SPRING_PROFILES_ACTIVE: ${USER_SERVICE_PROFILES:-kafka,redis,jwt,management,docker,cloud}
      MANAGEMENT_SERVER_PORT: "8081"
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      APP_JWT_ISSUER_URI: ${APP_JWT_ISSUER_URI:-}
      APP_JWT_JWK_SET_URI: ${APP_JWT_JWK_SET_URI:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_SECURITY_ENABLED: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_DATABASE: "0"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      APP_SERVICE_JWT_SECRET: ${APP_SERVICE_JWT_SECRET:-dev-service-jwt-secret-change-in-production-min-32b}
      APP_RATE_LIMIT_MAX_REQUESTS: ${APP_RATE_LIMIT_MAX_REQUESTS:-200}
      APP_NOTIFICATION_REST_BASE_URL: https://notification-service
      APP_NOTIFICATION_REST_INSECURE_SSL: "false"
    ports:
      - "${USER_SERVICE_HTTPS_PORT:-8443}:8443"
      - "${USER_SERVICE_MANAGEMENT_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    mem_limit: 768m
    cpus: 1.5
    networks:
      - unp-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: notification-service:latest
    container_name: unp-notification-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      mongo:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_PORT: "8888"
      CONFIG_FAIL_FAST: ${CONFIG_FAIL_FAST:-false}
      SPRING_PROFILES_ACTIVE: ${NOTIFICATION_SERVICE_PROFILES:-rest,kafka,redis,management,docker,cloud}
      MANAGEMENT_SERVER_PORT: "8081"
      APP_SERVICE_JWT_SECRET: ${APP_SERVICE_JWT_SECRET:-dev-service-jwt-secret-change-in-production-min-32b}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      SPRING_MONGODB_URI: mongodb://mongo:27017/notification
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_SECURITY_ENABLED: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_DATABASE: "0"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: "1025"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      APP_NOTIFICATION_SITE_NAME: ${APP_NOTIFICATION_SITE_NAME:-ваш сайт}
      APP_NOTIFICATION_MAIL_FROM: ${APP_NOTIFICATION_MAIL_FROM:-noreply@localhost}
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD:-changeit}
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    ports:
      - "${NOTIFICATION_SERVICE_HTTPS_PORT:-8444}:8443"
      - "${NOTIFICATION_SERVICE_MANAGEMENT_PORT:-8082}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    mem_limit: 768m
    cpus: 1.5
    networks:
      - unp-network

  api-gateway:
    profiles: ["cloud"]
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: api-gateway:latest
    container_name: unp-api-gateway
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_PORT: "8888"
      SPRING_PROFILES_ACTIVE: cloud,docker
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      APP_GATEWAY_INSECURE_SSL: "true"
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      APP_JWT_ISSUER_URI: ${APP_JWT_ISSUER_URI:-}
      APP_JWT_JWK_SET_URI: ${APP_JWT_JWK_SET_URI:-}
      API_GATEWAY_PORT: "8080"
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    networks:
      - unp-network

  web-bff:
    profiles: ["cloud"]
    build:
      context: .
      dockerfile: web-bff/Dockerfile
    image: web-bff:latest
    container_name: unp-web-bff
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      api-gateway:
        condition: service_started
    environment:
      CONFIG_SERVER_HOST: config-server
      CONFIG_SERVER_PORT: "8888"
      SPRING_PROFILES_ACTIVE: cloud,docker
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      APP_BFF_USER_SERVICE_BASE_URL: http://api-gateway:8080
      APP_BFF_NOTIFICATION_SERVICE_BASE_URL: http://api-gateway:8080
      APP_BFF_INSECURE_SSL: "false"
      WEB_BFF_PORT: "8090"
      TRACING_ENABLED: ${TRACING_ENABLED:-false}
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
    ports:
      - "${WEB_BFF_PORT:-8090}:8090"
    networks:
      - unp-network

  nginx:
    profiles: ["cloud"]
    image: nginx:1.27-alpine
    container_name: unp-nginx
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
      web-bff:
        condition: service_started
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/nginx-health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - unp-network

  keycloak:
    profiles: ["auth"]
    image: quay.io/keycloak/keycloak:26.0
    container_name: unp-keycloak
    restart: unless-stopped
    command: start-dev --import-realm --http-port=8180
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-platform.json:/opt/keycloak/data/import/realm-platform.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8180}:8180"
    networks:
      - unp-network

  zipkin:
    profiles: ["observability"]
    image: openzipkin/zipkin:3.4
    container_name: unp-zipkin
    restart: unless-stopped
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    networks:
      - unp-network

  alertmanager:
    profiles: ["observability"]
    image: prom/alertmanager:v0.28.0
    container_name: unp-alertmanager
    restart: unless-stopped
    volumes:
      - ./infra/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - unp-network

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.0.1
    container_name: unp-prometheus
    restart: unless-stopped
    depends_on:
      alertmanager:
        condition: service_started
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    networks:
      - unp-network

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.2.1
    container_name: unp-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - unp-network

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:3.2.1
    container_name: unp-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./infra/observability/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - unp-network
    depends_on:
      - loki

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.4.0
    container_name: unp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
      - zipkin
    networks:
      - unp-network

volumes:
  postgres_data:
  mongo_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  unp-network:
    driver: bridge
