# Единый docker-compose для всей платформы user-notification.
#
# Базовый стек (по умолчанию):
#     docker compose up -d
#       -> postgres, mongo, redis, mailpit, zookeeper, kafka, user-service, notification-service
#
# Только инфраструктура (для локального запуска приложений через mvn spring-boot:run):
#     docker compose up -d postgres mongo redis mailpit kafka
#
# Стек наблюдаемости (Prometheus + Grafana + Loki + Promtail):
#     docker compose --profile observability up -d
#
# Полный набор (приложения + observability):
#     docker compose --profile observability up -d
services:
  postgres:
    image: postgres:17-alpine
    container_name: unp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - unp-network

  mongo:
    image: mongo:7
    container_name: unp-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PUBLISH_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - unp-network

  redis:
    image: redis:7-alpine
    container_name: unp-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server /usr/local/etc/redis/redis.conf
        fi
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - unp-network

  mailpit:
    image: axllent/mailpit
    container_name: unp-mailpit
    restart: unless-stopped
    ports:
      - "${SMTP_PUBLISH_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - unp-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: unp-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - unp-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: unp-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PUBLISH_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - unp-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: user-service:latest
    container_name: unp-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      DB_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD:-changeit}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-admin123}
      APP_SEED_USER_PASSWORD: ${APP_SEED_USER_PASSWORD:-user123}
      SPRING_PROFILES_ACTIVE: ${USER_SERVICE_PROFILES:-kafka,redis,jwt,management}
      MANAGEMENT_SERVER_PORT: ${USER_SERVICE_MANAGEMENT_PORT:-8081}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_SECURITY_ENABLED: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_DATABASE: "0"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      APP_SERVICE_JWT_SECRET: ${APP_SERVICE_JWT_SECRET:-dev-service-jwt-secret-change-in-production-min-32b}
      APP_RATE_LIMIT_MAX_REQUESTS: ${APP_RATE_LIMIT_MAX_REQUESTS:-200}
      APP_NOTIFICATION_REST_BASE_URL: https://notification-service:8443
      APP_NOTIFICATION_REST_INSECURE_SSL: "false"
      GRPC_SERVER_PORT: ${USER_SERVICE_GRPC_PORT:-9090}
    ports:
      - "${USER_SERVICE_HTTPS_PORT:-8443}:8443"
      - "${USER_SERVICE_MANAGEMENT_PORT:-8081}:8081"
      - "${USER_SERVICE_GRPC_PORT:-9090}:9090"
    networks:
      - unp-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    image: notification-service:latest
    container_name: unp-notification-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${NOTIFICATION_SERVICE_PROFILES:-rest,kafka,redis,management}
      MANAGEMENT_SERVER_PORT: ${NOTIFICATION_SERVICE_MANAGEMENT_PORT:-8081}
      APP_SERVICE_JWT_SECRET: ${APP_SERVICE_JWT_SECRET:-dev-service-jwt-secret-change-in-production-min-32b}
      SPRING_MONGODB_URI: mongodb://mongo:27017/notification
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_SECURITY_ENABLED: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_DATABASE: "0"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: "1025"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      APP_NOTIFICATION_SITE_NAME: ${APP_NOTIFICATION_SITE_NAME:-ваш сайт}
      APP_NOTIFICATION_MAIL_FROM: ${APP_NOTIFICATION_MAIL_FROM:-noreply@localhost}
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD:-changeit}
    ports:
      - "${NOTIFICATION_SERVICE_HTTPS_PORT:-8444}:8443"
      - "${NOTIFICATION_SERVICE_MANAGEMENT_PORT:-8082}:8081"
    networks:
      - unp-network

  # ============================================================
  #                Observability (опционально)
  # ============================================================
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.0.1
    container_name: unp-prometheus
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    networks:
      - unp-network

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.2.1
    container_name: unp-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    networks:
      - unp-network

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:3.2.1
    container_name: unp-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./infra/observability/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - unp-network
    depends_on:
      - loki

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.4.0
    container_name: unp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - unp-network

volumes:
  postgres_data:
  mongo_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  unp-network:
    driver: bridge
