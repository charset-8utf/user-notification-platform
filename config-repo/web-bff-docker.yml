eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

spring:
  cloud:
    discovery:
      client:
        simple:
          instances:
            api-gateway:
              - uri: http://api-gateway:8080

app:
  bff:
    # BFF → API Gateway (паттерн лекции: единая точка входа)
    user-service-base-url: http://api-gateway:8080
    notification-service-base-url: http://api-gateway:8080
    insecure-ssl: false
    load-balanced: true
