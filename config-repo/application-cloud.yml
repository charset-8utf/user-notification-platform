spring:
  cloud:
    discovery:
      client:
        simple:
          instances:
            user-service:
              - uri: https://${USER_SERVICE_HOST:user-service}:8443
            notification-service:
              - uri: https://${NOTIFICATION_SERVICE_HOST:notification-service}:8443
            api-gateway:
              - uri: ${API_GATEWAY_URI:https://api-gateway:8080}
