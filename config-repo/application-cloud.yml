# Cloud profile defaults (discovery via Simple Discovery Client).
spring:
  cloud:
    discovery:
      client:
        simple:
          instances:
            user-service:
              - uri: https://${USER_SERVICE_HOST:user-service}:8443
            notification-service:
              - uri: https://${NOTIFICATION_SERVICE_HOST:notification-service}:8443
            api-gateway:
              - uri: http://${API_GATEWAY_HOST:api-gateway}:8080
