# Docker Compose: static service registry (replaces Eureka).
platform:
  environment: docker

spring:
  cloud:
    discovery:
      client:
        simple:
          instances:
            user-service:
              - uri: https://user-service:8443
            notification-service:
              - uri: https://notification-service:8443
            api-gateway:
              - uri: http://api-gateway:8080
