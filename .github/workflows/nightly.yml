name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  observability:
    name: Observability profile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Start observability stack
        run: |
          chmod +x gradlew scripts/ci.sh
          ./scripts/ci.sh observability-up
          curl -fsS http://localhost:9091/-/ready
          curl -fsS http://localhost:3000/api/health

      - name: Tear down
        if: always()
        run: ./scripts/ci.sh e2e-down || true
