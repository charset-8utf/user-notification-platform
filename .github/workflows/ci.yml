name: CI

on:
  push:
    branches: [main, develop, microservice-feature]
  pull_request:
    branches: [main, develop, microservice-feature]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Gradle check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run tests
        run: chmod +x gradlew && ./gradlew check --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          retention-days: 7
          path: |
            **/build/reports/tests/
            **/build/reports/jacoco/

      - name: Publish JUnit results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: "**/build/test-results/**/TEST-*.xml"
          check_name: JUnit
          fail_on_failure: true

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint and template
        run: |
          helm lint deploy/helm/platform
          helm template platform deploy/helm/platform --namespace platform > /dev/null
