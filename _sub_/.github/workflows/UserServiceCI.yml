name: CI - Сборка, тестирование и контейнеризация

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Загрузка кода
        uses: actions/checkout@v4

      - name: Установка JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Сборка и тестирование через Maven
        run: mvn clean verify

      - name: Загрузка отчётов тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: Сборка Docker-образа
        run: docker build -t user-service:latest .

      - name: Запуск PostgreSQL для smoke-теста
        run: |
          docker run -d --name postgres \
            -e POSTGRES_DB=userdb \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 5432:5432 postgres:17-alpine
          # Ожидание готовности PostgreSQL
          for i in {1..30}; do
            docker exec postgres pg_isready -U postgres && break || sleep 1
          done

      - name: Smoke-тест приложения
        run: |
          # Передаём команды меню: 5 (показать всех), 0 (выход)
          echo -e "5\n0" | docker run -i --rm \
            --network host \
            -e DB_URL=jdbc:postgresql://localhost:5432/userdb \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            user-service:latest