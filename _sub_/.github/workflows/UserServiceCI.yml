name: CI - Сборка, тестирование и контейнеризация

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Загрузка кода
        uses: actions/checkout@v4

      - name: Установка JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Сборка и тестирование через Maven
        run: mvn clean verify

      - name: Загрузка отчётов тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка Docker-образа с кешем
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-тест приложения
        run: |
          docker compose up -d postgres
          docker compose run --rm -T app sh -c 'printf "1\n6\n0\n0\n" | java $JAVA_OPTS -jar app.jar'

      - name: Очистка compose-окружения
        if: always()
        run: docker compose down -v --remove-orphans