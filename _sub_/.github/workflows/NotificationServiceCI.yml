name: CI - Сборка, тестирование и контейнеризация (notification-service)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Загрузка кода
        uses: actions/checkout@v4

      - name: Установка JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Сборка и тестирование через Maven
        run: mvn clean verify

      - name: Загрузка отчётов тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка Docker-образа с кешем
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: notification-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-тест приложения (Mongo + Kafka + Mailpit)
        run: |
          docker compose --profile app up -d --no-build
          echo "Ожидание healthcheck notification-app..."
          timeout 120 bash -c 'until docker inspect --format="{{.State.Health.Status}}" notification-app 2>/dev/null | grep -q healthy; do sleep 5; done'
          echo "Healthcheck пройден"

      - name: Логи compose при ошибке
        if: failure()
        run: docker compose --profile app logs --no-color | tail -300

      - name: Очистка compose-окружения
        if: always()
        run: docker compose --profile app down -v --remove-orphans
