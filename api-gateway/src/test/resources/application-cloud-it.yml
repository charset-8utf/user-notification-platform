spring:
  cloud:
    discovery:
      enabled: false
    loadbalancer:
      enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-test
              uri: ${test.downstream.user-service-uri}
              predicates:
                - Path=/api/users/**
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

eureka:
  client:
    enabled: false
