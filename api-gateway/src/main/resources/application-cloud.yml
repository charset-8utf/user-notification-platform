spring:
  config:
    import: optional:classpath:platform/discovery-defaults.yml

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  cloud:
    discovery:
      client:
        simple:
          instances:
            user-service:
              - uri: https://${USER_SERVICE_HOST:user-service}:8443
            notification-service:
              - uri: https://${NOTIFICATION_SERVICE_HOST:notification-service}:8443
    gateway:
      server:
        webflux:
          httpclient:
            ssl:
              use-insecure-trust-manager: ${app.gateway.ssl.insecure-trust-manager:true}
          routes:
            - id: user-service-auth
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${app.gateway.rate-limit.auth.replenish-rate:30}
                    redis-rate-limiter.burstCapacity: ${app.gateway.rate-limit.auth.burst-capacity:60}
                    key-resolver: "#{@ipKeyResolver}"
            - id: user-service-api
              uri: lb://user-service
              predicates:
                - Path=/api/users/**,/api/roles/**,/api/profiles/**
              filters:
                - TokenRelay=
                - name: CircuitBreaker
                  args:
                    name: userServiceCb
                    fallbackUri: forward:/fallback/user
                - name: Retry
                  args:
                    retries: 3
                    methods: GET
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${app.gateway.rate-limit.user-api.replenish-rate:50}
                    redis-rate-limiter.burstCapacity: ${app.gateway.rate-limit.user-api.burst-capacity:100}
                    key-resolver: "#{@jwtSubKeyResolver}"
            - id: notification-service-logs
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/logs/**
              filters:
                - TokenRelay=
                - name: CircuitBreaker
                  args:
                    name: notificationServiceCb
                    fallbackUri: forward:/fallback/notification
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${app.gateway.rate-limit.notification-logs.replenish-rate:30}
                    redis-rate-limiter.burstCapacity: ${app.gateway.rate-limit.notification-logs.burst-capacity:60}
                    key-resolver: "#{@jwtSubKeyResolver}"

app:
  gateway:
    ssl:
      insecure-trust-manager: ${APP_GATEWAY_INSECURE_SSL:true}
    rate-limit:
      auth:
        replenish-rate: ${APP_GATEWAY_AUTH_REPLENISH_RATE:30}
        burst-capacity: ${APP_GATEWAY_AUTH_BURST_CAPACITY:60}
      user-api:
        replenish-rate: ${APP_GATEWAY_USER_REPLENISH_RATE:50}
        burst-capacity: ${APP_GATEWAY_USER_BURST_CAPACITY:100}
      notification-logs:
        replenish-rate: ${APP_GATEWAY_NOTIFICATION_REPLENISH_RATE:30}
        burst-capacity: ${APP_GATEWAY_NOTIFICATION_BURST_CAPACITY:60}
  security:
    jwt:
      secret: ${APP_JWT_SECRET:dev-jwt-secret-change-in-production-min-32-chars}
      issuer: ${APP_JWT_ISSUER:user-service}
      issuer-uri: ${APP_JWT_ISSUER_URI:}
      jwk-set-uri: ${APP_JWT_JWK_SET_URI:}
