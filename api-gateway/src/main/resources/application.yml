spring:
  application:
    name: api-gateway

  config:
    import:
      - optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
      - optional:classpath:platform/tracing-defaults.yml

  cloud:
    config:
      fail-fast: ${CONFIG_FAIL_FAST:false}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:cloud}

server:
  port: ${API_GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      userServiceCb:
        base-config: default
      notificationServiceCb:
        base-config: default
