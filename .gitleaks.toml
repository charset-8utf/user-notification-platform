title = "user-notification-platform gitleaks config"

[allowlist]
description = "Dev/demo placeholders and test fixtures"
paths = [
  '''\.env\.example$''',
  '''docker-compose\.yml$''',
  '''docker-compose\..+\.yml$''',
  '''\.github/workflows/.+\.yml$''',
  '''config-repo/.+\.yml$''',
  '''deploy/helm/.+\.yaml$''',
  '''README\.md$''',
  '''scripts/.+\.sh$''',
  '''infra/.+\.(sh|conf|json|yml)$''',
  '''.+/application-test\.yml$''',
  '''.+/application-it\.yml$''',
  '''.+/ServiceJwtTestSupport\.java$''',
  '''.+/JwtAuthTestSupport\.java$''',
]

regexes = [
  '''dev-jwt-secret''',
  '''dev-service-jwt-secret''',
  '''e2e-smoke-service-jwt-secret''',
  '''admin123''',
  '''user123''',
  '''changeit''',
  '''postgres''',
]
