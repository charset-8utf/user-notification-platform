# Локальная разработка: приложение через Maven внутри builder-образа (горячее монтирование src).
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Том maven-repo сохраняет зависимости между перезапусками.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: user-service:dev-builder
    working_dir: /build
    command: ["mvn", "-ntp", "spring-boot:run"]
    restart: "no"
    volumes:
      - ./src:/build/src
      - ./pom.xml:/build/pom.xml
      - maven-repo:/root/.m2
    stdin_open: true
    tty: true

volumes:
  maven-repo:
