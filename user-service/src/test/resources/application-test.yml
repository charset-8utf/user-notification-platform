spring:
  cloud:
    discovery:
      enabled: false
    loadbalancer:
      enabled: false
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      register-mbeans: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
  liquibase:
    enabled: false
  cache:
    type: none

server:
  port: 0
  ssl:
    enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

app:
  rate-limit:
    max-requests: 1000
    window-seconds: 60

logging:
  level:
    com.crud: DEBUG
    org.hibernate.SQL: DEBUG
