app:
  security:
    service-jwt:
      secret: ${APP_SERVICE_JWT_SECRET:dev-service-jwt-secret-change-in-production-min-32b}
      issuer: ${APP_SERVICE_JWT_ISSUER:user-notification-platform}
      subject: ${APP_SERVICE_JWT_SUBJECT:user-service}
      audience: ${APP_SERVICE_JWT_AUDIENCE:notification-service}
      scope: ${APP_SERVICE_JWT_SCOPE:notifications:write}
      token-ttl: ${APP_SERVICE_JWT_TTL:PT5M}
  notification:
    rest:
      base-url: ${APP_NOTIFICATION_REST_BASE_URL:https://notification-service:8443}
      insecure-ssl: ${APP_NOTIFICATION_REST_INSECURE_SSL:false}
      tls:
        trust-store: ${APP_NOTIFICATION_REST_TRUST_STORE:classpath:notification-truststore.p12}
        trust-store-password: ${APP_NOTIFICATION_REST_TRUST_STORE_PASSWORD:${KEYSTORE_PASSWORD:changeit}}
        trust-store-type: ${APP_NOTIFICATION_REST_TRUST_STORE_TYPE:PKCS12}
      connect-timeout: ${APP_NOTIFICATION_REST_CONNECT_TIMEOUT:PT2S}
      read-timeout: ${APP_NOTIFICATION_REST_READ_TIMEOUT:PT5S}

resilience4j:
  circuitbreaker:
    instances:
      notification-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  bulkhead:
    instances:
      notification-service:
        max-concurrent-calls: 8
        max-wait-duration: 1s
