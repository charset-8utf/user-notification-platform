app:
  security:
    jwt:
      secret: ${APP_JWT_SECRET:dev-jwt-secret-change-in-production-min-32-chars}
      issuer: ${APP_JWT_ISSUER:user-service}
      issuer-uri: ${APP_JWT_ISSUER_URI:}
      jwk-set-uri: ${APP_JWT_JWK_SET_URI:}
      access-token-ttl: ${APP_JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${APP_JWT_REFRESH_TTL:P7D}
