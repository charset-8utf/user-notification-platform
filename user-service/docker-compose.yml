# Запуск: скопировать .env из .env.example и выполнить
#   docker compose up --build -d
# Свежая БД без старых миграций (Liquibase): docker compose down -v
services:
  postgres:
    image: postgres:17-alpine
    container_name: user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: user-service:latest
    container_name: user-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/userdb
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD:-changeit}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-admin123}
      APP_SEED_USER_PASSWORD: ${APP_SEED_USER_PASSWORD:-user123}
    ports:
      - "${APP_HTTPS_PORT:-8443}:8443"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
