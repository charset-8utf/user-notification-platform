# Shared user cache (user-service writes, notification-service reads).
# Keys: user:{id}, user:email:{email} — single logical database is enough.

bind 0.0.0.0
port 6379
tcp-keepalive 300

databases 1

save ""
appendonly no

maxmemory 256mb
maxmemory-policy allkeys-lru

protected-mode no

loglevel notice
