$kind: http-request
name: Login (JWT)
description: Сохраняет accessToken и refreshToken в окружение. Для API-запросов коллекция использует Bearer {{accessToken}}.
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "{{adminUser}}",
      "password": "{{adminPass}}"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
        const body = pm.response.json();
        pm.environment.set('accessToken', body.accessToken);
        pm.environment.set('refreshToken', body.refreshToken);
      }
order: 100
