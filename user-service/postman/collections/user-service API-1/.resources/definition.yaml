$kind: collection
name: user-service API
description: "REST API (HTTPS, 8443). Отключите SSL verification для localhost. Окружение «user-service local-1». Сначала «Аутентификация → Login (JWT)» — сохранит accessToken. Коллекция: Bearer {{accessToken}}. Профиль local: можно Basic. «Мониторинг» — без auth (или management :8081). Роли — только ADMIN."
variables:
  baseUrl: https://localhost:8443
  adminUser: admin
  adminPass: admin123
  regularUser: user
  regularPass: user123
  userId: "1"
  secondUserId: "2"
  noteId: "1"
  roleId: "1"
  roleIdUser: "2"
  customRoleId: "3"
auth:
  - id: e26b059c-1a5a-4ba6-a88e-56b2df855138
    type: bearer
    name: JWT access token
    credentials:
      token: "{{accessToken}}"
